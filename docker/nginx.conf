server_tokens off;

# Redirect legacy domain (and its www) to the canonical one, keeping the path.
server {
    listen 3000;
    server_name salmorejotech.com www.salmorejotech.com;

    return 301 https://salmorejo.tech$request_uri;
}

# Canonical site (salmorejo.tech) + default for any other host.
server {
    listen 3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    port_in_redirect off;
    absolute_redirect off;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
